name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'bun'

      - name: Install dependencies
        run: bun install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create Google-services.json placeholder
        run: |
          echo '{}' > android/app/google-services.json
        env:
          # If you have a real google-services.json, add it as a secret
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" > .env
        env:
          EXPO_PUBLIC_API_URL: https://gosharebd.com

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          ls -la app/build/outputs/apk/release/

      - name: Get version name
        id: version
        run: |
          VERSION_NAME=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            GoShareBD Mobile App v${{ steps.version.outputs.version }}
            
            Install this APK on your Android device to test the app.
            
            ### Features
            - Browse tour packages
            - View package details
            - Account management
            - And more...
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gosharebd-apk
          path: android/app/build/outputs/apk/release/app-release.apk
